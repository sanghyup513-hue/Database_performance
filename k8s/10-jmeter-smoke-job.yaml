# 파이프라인 검증용 더미 Job — JMeter 이미지가 클러스터에서 정상 실행되는지 확인.
# 실제 부하 실행(.jmx 테스트 계획 + DB 시크릿)은 이후 단계에서 채운다.
# 재실행 시: kubectl -n benchmark delete job jmeter-smoke 후 다시 apply.
apiVersion: batch/v1
kind: Job
metadata:
  name: jmeter-smoke
  namespace: benchmark
  labels:
    app.kubernetes.io/part-of: db-perf-benchmark
    app.kubernetes.io/component: jmeter
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600   # 완료 10분 뒤 자동 정리
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: db-perf-benchmark
        app.kubernetes.io/component: jmeter
    spec:
      restartPolicy: Never
      containers:
        - name: jmeter
          image: benchmark/jmeter:5.6.3
          imagePullPolicy: IfNotPresent   # 로컬 import 이미지 사용 (레지스트리 pull 안 함)
          args: ["--version"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
