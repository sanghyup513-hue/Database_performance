# Standalone Prometheus (벤치마크 전용) — 방식 A.
#
# 격리 원칙 (운영 서버의 기존 mstr-prometheus 스택을 절대 건드리지 않기 위함):
#  - 모든 리소스는 benchmark 네임스페이스 안 namespaced 리소스만 생성한다.
#  - ClusterRole / ClusterRoleBinding / CRD / prometheus-operator 를 일절 쓰지 않는다.
#  - kubernetes_sd_configs(클러스터 전체 디스커버리, ClusterRole 필요)도 쓰지 않는다.
#  - 외부 DB exporter 는 static_configs / file_sd 로 '원격 scrape' 한다.
#  => 이 매니페스트만으로는 어떤 cluster-scoped 객체도 만들지 않으므로 다른 네임스페이스에 영향 없음.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-bench
  namespace: benchmark
  labels:
    app.kubernetes.io/part-of: db-perf-benchmark
    app.kubernetes.io/component: prometheus
# 의도적으로 어떤 Role/ClusterRole 도 바인딩하지 않는다 (권한 없음 = 격리).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-bench-config
  namespace: benchmark
  labels:
    app.kubernetes.io/part-of: db-perf-benchmark
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        monitor: db-perf-benchmark

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # ── 외부 DB exporter ───────────────────────────────────────────
      # 외부 DB 서버에서 도는 exporter 를 이 standalone Prometheus 가 원격 scrape.
      # 타깃(호스트:포트) 목록은 DB 호스트/IP 평문 커밋을 피하기 위해 repo 에 두지 않고,
      # 클러스터에만 생성하는 ConfigMap(prometheus-bench-targets) 을 file_sd 로 읽는다.
      #   파일: /etc/prometheus/targets/<job>.json (예: [{"targets":["<host>:9187"],"labels":{...}}])
      - job_name: postgresql
        file_sd_configs:
          - files: ['/etc/prometheus/targets/postgresql.json']
      - job_name: altibase
        file_sd_configs:
          - files: ['/etc/prometheus/targets/altibase.json']
      # JMeter 부하 생성기(요청측 메트릭). 부하 실행 중에만 타깃 존재(ephemeral).
      - job_name: jmeter
        scrape_interval: 5s
        file_sd_configs:
          - files: ['/etc/prometheus/targets/jmeter.json']
      # 호스트 자원(node_exporter): DB 서버 + 부하생성기 CPU/메모리/디스크IO/네트워크
      - job_name: node
        scrape_interval: 5s
        file_sd_configs:
          - files: ['/etc/prometheus/targets/node.json']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-bench
  namespace: benchmark
  labels:
    app.kubernetes.io/part-of: db-perf-benchmark
    app.kubernetes.io/component: prometheus
    app: prometheus-bench
spec:
  replicas: 1
  strategy:
    type: Recreate          # emptyDir 단일 인스턴스 (테스트). 운영은 PVC 권장.
  selector:
    matchLabels:
      app: prometheus-bench
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: db-perf-benchmark
        app.kubernetes.io/component: prometheus
        app: prometheus-bench
    spec:
      serviceAccountName: prometheus-bench
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534      # nobody
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.12.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle      # POST /-/reload 로 설정 재적용
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: targets
              mountPath: /etc/prometheus/targets
              readOnly: true
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-bench-config
        - name: targets
          configMap:
            name: prometheus-bench-targets   # 타깃 목록(호스트:포트). 클러스터에만 생성, repo 미커밋.
            optional: true                    # 없어도 Pod 기동 (타깃 비활성 상태로 시작)
        - name: storage
          emptyDir: {}          # 테스트용 휘발성. 운영은 PVC 로 교체.
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-bench
  namespace: benchmark
  labels:
    app.kubernetes.io/part-of: db-perf-benchmark
    app.kubernetes.io/component: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus-bench
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 30090   # 테스트 접근용. 운영은 ingress/사내 정책에 맞춰 조정.
